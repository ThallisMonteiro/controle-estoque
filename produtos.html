<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Produtos - Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <header class="navbar">
      <div class="logo">Controle de Estoque</div>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="produtos.html" class="active">Produtos</a></li>
        <li><a href="movimentacoes.html">Movimentações</a></li>
        <li><a href="relatorios.html">Relatórios</a></li>
      </ul>
    </header>

    <!-- CONTEÚDO -->
    <main class="container">
      <div class="page-header">
        <h1>Gestão de Produtos</h1>
        <button class="btn-primary">+ Adicionar Produto</button>
        <div class="form-produto" id="formProduto" style="display: none">
          <h3>Novo Produto</h3>

          <input type="text" id="nome" placeholder="Nome do Produto" />
          <input type="text" id="categoria" placeholder="Categoria" />
          <input type="number" id="quantidade" placeholder="Quantidade" />
          <input
            type="number"
            id="precoUnitario"
            placeholder="Preço Unitário"
          />

          <button id="salvarProduto" class="btn-primary">Salvar</button>
        </div>
      </div>

      <div class="search-box">
        <input type="text" id="buscarProduto" placeholder="Buscar produto..." />
      </div>

      <table class="tabela-produtos">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Quantidade</th>
            <th>Preço Unitário</th>
            <th>Preço Total</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <button class="btn-edit">Editar</button>
              <button class="btn-delete">Excluir</button>
            </td>
          </tr>
        </tbody>
      </table>
    </main>
    <script src="js/produtos.js"></script>
  </body>
</html>
