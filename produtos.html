<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Produtos - Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <header class="sidebar">
      <div class="logo_text">
        <span class="logo-mini">EI</span>
        <span class="logo-full">Estoque Inteligente</span>
      </div>

      <nav>
        <ul>
          <li>
            <a href="index.html">
              <i data-lucide="layout-dashboard"></i>
              <span class="link-text">Dashboard</span>
            </a>
          </li>

          <li>
            <a href="produtos.html" class="ativo">
              <i data-lucide="box"></i>
              <span class="link-text">Produtos</span>
            </a>
          </li>

          <li>
            <a href="movimentacoes.html">
              <i data-lucide="arrow-left-right"></i>
              <span class="link-text">Movimentações</span>
            </a>
          </li>

          <li>
            <a href="relatorios.html">
              <i data-lucide="bar-chart-3"></i>
              <span class="link-text">Relatórios</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <div class="main-content">
      <div class="page-header">
        <h1>Gestão de Estoque</h1>

        <div class="form-produto" id="formProduto" style="display: none">
          <h3>Novo Produto</h3>

          <input type="text" id="nome" placeholder="Nome do Produto" />
          <input type="text" id="categoria" placeholder="Categoria" />
          <input type="number" id="quantidade" placeholder="Quantidade" />
          <input
            type="number"
            id="precoUnitario"
            placeholder="Preço Unitário"
          />
          <button id="salvarProduto" class="btn-primary">Salvar</button>
        </div>

        <div class="search-box">
          <input type="text" id="buscarProduto" placeholder="Buscar produto..."/>
          <button id="btnAddProduto" class="btn-primary">+ Adicionar Produto</button>
        </div>

        <table class="tabela-produtos">
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Quantidade</th>
              <th>Preço Unitário</th>
              <th>Preço Total</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <script src="js/produtos.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
