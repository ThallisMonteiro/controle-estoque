<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- MENU SUPERIOR -->
    <header class="navbar">
      <div class="logo">EstoqueFácil</div>
      <nav>
        <ul>
          <li><a href="index.html" class="ativo">Dashboard</a></li>
          <li><a href="produtos.html">Produtos</a></li>
          <li><a href="movimentacoes.html">Movimentações</a></li>
          <li><a href="relatorios.html">Relatórios</a></li>
        </ul>
      </nav>
    </header>

    <!-- CONTEÚDO -->
    <main class="content">
      <h1>Dashboard</h1>

      <div class="cards">
        <div class="card">
          <h3>Total de Produtos</h3>
          <p id="totalProdutos">0</p>
        </div>

        <div class="card">
          <h3>Valor Total em Estoque</h3>
          <p id="valorTotal">R$ 0,00</p>
        </div>

        <div class="card alerta">
          <h3>Produtos com Estoque Baixo</h3>
          <p id="estoqueBaixo">0</p>
        </div>
      </div>

      <div class="tabela">
        <h2>Últimas Movimentações</h2>
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Tipo</th>
              <th>Quantidade</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="tabelaMovimentacoes"></tbody>
        </table>
      </div>
    </main>

    <script src="js/dashboard.js"></script>
  </body>
</html>
