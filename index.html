<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <body>
    <header class="sidebar">
      <div class="logo_text">
        <span class="logo-mini">EI</span>
        <span class="logo-full">Estoque Inteligente</span>
      </div>

      <nav>
  <ul>
    <li>
      <a href="index.html" >
        <i data-lucide="layout-dashboard"></i>
        <span class="link-text">Dashboard</span>
      </a>
    </li>

    <li>
      <a href="produtos.html" class="ativo">
        <i data-lucide="box"></i>
        <span class="link-text">Produtos</span>
      </a>
    </li>

    <li>
      <a href="movimentacoes.html">
        <i data-lucide="arrow-left-right"></i>
        <span class="link-text">Movimentações</span>
      </a>
    </li>

    <li>
      <a href="relatorios.html">
        <i data-lucide="bar-chart-3"></i>
        <span class="link-text">Relatórios</span>
      </a>
    </li>
  </ul>
</nav>

    </header>

    <div class="main-content">
      <h1>Dashboard</h1>

      <div class="cards-container">
        <div class="card">
          <h3>Total de Produtos</h3>
          <p id="totalProdutos">0</p>
        </div>

        <div class="card">
          <h3>Valor Total em Estoque</h3>
          <p id="valorTotal">R$ 0,00</p>
        </div>

        <div class="card alerta">
          <h3>Produtos com Estoque Baixo</h3>
          <p id="estoqueBaixo">0</p>
        </div>
      </div>

      <div class="tabela">
        <h2>Últimas Movimentações</h2>
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Tipo</th>
              <th>Quantidade</th>
              <th>Data</th>
            </tr>
          </thead>
          <tbody id="tabelaMovimentacoes"></tbody>
        </table>
      </div>
    </main>

    <script src="js/dashboard.js"></script>
    <script>lucide.createIcons();</script>
  </body>
</html>
