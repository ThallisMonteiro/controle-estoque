<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movimentações - Estoque Inteligente</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <main class="main-content">
      <div class="page-header">
        <h1>Movimentações de Produtos</h1>
      </div>

      <div class="form-movimentacao">
        <select id="produtoSelect"></select>

        <select id="tipo">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <input type="number" id="quantidadeMov" placeholder="Quantidade" />
        <input type="text" id="destino" placeholder="Destino" />
        <button id="registrarMov" class="btn-primary"> Registrar Movimentação </button>
        <button id="limparMov" class="btn-delete"> Limpar Movimentações </button>
      </div>

      <div class="tabela">
        <h2>Movimentações</h2>
        <div class="tabela-stats">
          <span>Total de movimentações: <strong id="totalMovimentacoesList">0</strong></span>
          <span>Entradas: <strong id="totalEntradas">0</strong></span>
          <span>Saídas: <strong id="totalSaidas">0</strong></span>
        </div>
        <table class="tabela-produtos">
          <thead>
            <tr>
              <th>Produto</th>
              <th>Tipo</th>
              <th>Quantidade</th>
              <th>Data/Hora</th>
              <th>Destino</th>
            </tr>
          </thead>
          <tbody id="tabelaMovimentacoes"></tbody>
        </table>
      </div>
    </main>

    <script src="js/api-client.js"></script>
    <script src="js/checkauth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/movimentacoes.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
