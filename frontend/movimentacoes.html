<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Movimentações - Estoque Inteligente</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <header class="sidebar">
       <div class="logo_text">
        <i data-lucide="warehouse" class="logo-icon"></i>
        <span class="logo-full">Estoque Inteligente</span>
      </div>

      <nav>
        <ul>
          <li>
            <a href="index.html">
              <i data-lucide="layout-dashboard"></i>
              <span class="link-text">Dashboard</span>
            </a>
          </li>

          <li>
            <a href="produtos.html">
              <i data-lucide="box"></i>
              <span class="link-text">Produtos</span>
            </a>
          </li>

          <li>
            <a href="movimentacoes.html" class="ativo">
              <i data-lucide="arrow-left-right"></i>
              <span class="link-text">Movimentações</span>
            </a>
          </li>

          <li>
            <a href="relatorios.html">
              <i data-lucide="file-text"></i>
              <span class="link-text">Relatórios</span>
            </a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="main-content">
      <div class="page-header">
        <h1>Movimentações de Produtos</h1>
      </div>

      <div class="form-movimentacao">
        <select id="produtoSelect"></select>

        <select id="tipo">
          <option value="Entrada">Entrada</option>
          <option value="Saída">Saída</option>
        </select>

        <input type="number" id="quantidadeMov" placeholder="Quantidade" />
        <input type="text" id="destino" placeholder="Destino" />
        <button id="registrarMov" class="btn-primary"> Registrar Movimentação </button>
        <button id="limparMov" class="btn-delete"> Limpar Movimentações </button>
      </div>

      <table class="tabela-produtos">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Tipo</th>
            <th>Quantidade</th>
            <th>Data/Hora</th>
            <th>Destino</th>
          </tr>
        </thead>
        <tbody id="tabelaMovimentacoes"></tbody>
      </table>
    </main>

    <script src="js/movimentacoes.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
