<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Movimentações - Estoque Inteligente</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>

    <main class="main-content">
      <div class="page-header">
        <h1>Movimentações de Produtos</h1>
      </div>

      <div class="form-movimentacao">
        <select id="produtoSelect"></select>

        <select id="tipo">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <input type="number" id="quantidadeMov" placeholder="Quantidade" />
        <input type="text" id="destino" placeholder="Destino" />
        <button id="registrarMov" class="btn-primary"> Registrar Movimentação </button>
        <button id="limparMov" class="btn-delete"> Limpar Movimentações </button>
      </div>

      <table class="tabela-produtos">
        <thead>
          <tr>
            <th>Produto</th>
            <th>Tipo</th>
            <th>Quantidade</th>
            <th>Data/Hora</th>
            <th>Destino</th>
          </tr>
        </thead>
        <tbody id="tabelaMovimentacoes"></tbody>
      </table>
    </main>

    <script src="js/sidebar.js"></script>
    <script src="js/movimentacoes.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
