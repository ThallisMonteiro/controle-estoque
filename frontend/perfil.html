<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perfil - Estoque Inteligente</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>

  <body>
    <div class="main-content">
      <div class="page-header">
        <h1>Meu Perfil</h1>
      </div>

      <!-- Card de Perfil Principal -->
      <div class="perfil-container">
        <div class="perfil-card">
          <div class="perfil-header">
            <div class="perfil-avatar" id="perfilAvatar">U</div>
            <div class="perfil-info">
              <h2 id="perfilNome">Carregando...</h2>
              <p id="perfilEmail">-</p>
              <span class="perfil-badge" id="perfilStatus">Ativo</span>
            </div>
          </div>

          <div class="perfil-details">
            <div class="detalhe-item">
              <i data-lucide="calendar"></i>
              <div>
                <span class="label">Membro desde</span>
                <span class="valor" id="perfilDataCriacao">-</span>
              </div>
            </div>
            <div class="detalhe-item">
              <i data-lucide="clock"></i>
              <div>
                <span class="label">Última atualização</span>
                <span class="valor" id="perfilDataAtualizacao">-</span>
              </div>
            </div>
          </div>

          <div class="perfil-actions">
            <button id="btnEditarPerfil" class="btn-primary">Editar Perfil</button>
            <button id="btnAlterarSenha" class="btn-warning">Alterar Senha</button>
            <button id="btnLogout" class="btn-danger">Sair</button>
          </div>
        </div>

        <!-- Cards de Estatísticas -->
        <div class="stats-container">
          <div class="stat-card">
            <i data-lucide="box" class="stat-icon"></i>
            <div>
              <span class="stat-label">Produtos</span>
              <span class="stat-number" id="totalProdutosStats">0</span>
            </div>
          </div>

          <div class="stat-card">
            <i data-lucide="list" class="stat-icon"></i>
            <div>
              <span class="stat-label">Categorias</span>
              <span class="stat-number" id="totalCategoriasStats">0</span>
            </div>
          </div>

          <div class="stat-card">
            <i data-lucide="arrow-left-right" class="stat-icon"></i>
            <div>
              <span class="stat-label">Movimentações</span>
              <span class="stat-number" id="totalMovimentacoesStats">0</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Formulário Editar Perfil -->
      <div class="form-container" id="formEditarContainer" style="display: none">
        <div class="form-titulo">
          <h3>Editar Perfil</h3>
          <button class="btn-close" id="fecharEditarPerfil">&times;</button>
        </div>

        <form id="formEditarPerfil">
          <div class="form-group">
            <label for="editarNome">Nome:</label>
            <input type="text" id="editarNome" placeholder="Seu nome completo" required />
          </div>

          <div class="form-group">
            <label for="editarEmail">Email:</label>
            <input type="email" id="editarEmail" placeholder="seu@email.com" required />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Salvar Alterações</button>
            <button type="button" class="btn-secondary" id="cancelarEditarPerfil">
              Cancelar
            </button>
          </div>
        </form>
      </div>

      <!-- Formulário Alterar Senha -->
      <div class="form-container" id="formAlterarSenhaContainer" style="display: none">
        <div class="form-titulo">
          <h3>Alterar Senha</h3>
          <button class="btn-close" id="fecharAlterarSenha">&times;</button>
        </div>

        <form id="formAlterarSenha">
          <div class="form-group">
            <label for="senhaAtual">Senha Atual:</label>
            <input type="password" id="senhaAtual" placeholder="Sua senha atual" required />
          </div>

          <div class="form-group">
            <label for="novaSenha">Nova Senha:</label>
            <input
              type="password"
              id="novaSenha"
              placeholder="Mínimo 6 caracteres"
              required
            />
          </div>

          <div class="form-group">
            <label for="confirmarSenha">Confirmar Senha:</label>
            <input type="password" id="confirmarSenha" placeholder="Repita a nova senha" required />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">Alterar Senha</button>
            <button type="button" class="btn-secondary" id="cancelarAlterarSenha">
              Cancelar
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/checkauth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/perfil.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
