<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="main-content">
      <h1>Dashboard</h1>

      <div class="cards-container">
        <div class="card">
          <h3>Total de Produtos</h3>
          <p id="totalProdutos">0</p>
        </div>

        <div class="card">
          <h3>Valor Total em Estoque</h3>
          <p id="valorTotal">R$ 0,00</p>
        </div>

        <div class="card alerta">
          <h3>Produtos com Estoque Baixo</h3>
          <p id="estoqueBaixo">0</p>
        </div>
      </div>

      <div class="graficos-container">
        <div class="grafico-item">
          <div class="grafico-box">
            <h2>Produtos por Categoria</h2>
            <canvas id="graficoCategorias"></canvas>
          </div>
        </div>

        <div class="grafico-item">
          <div class="grafico-box">
            <h2>Movimentações (Entrada vs Saída)</h2>
            <canvas id="graficoMovimentacoes"></canvas>
          </div>
        </div>
      </div>

      <div class="graficos-container">
        <div class="grafico-item">
          <div class="grafico-box">
            <h2>Produtos Mais Movimentados</h2>
            <canvas id="graficoProdutosMostrados"></canvas>
          </div>
        </div>

        <div class="grafico-item">
          <div class="grafico-box">
            <h2>Evolução do Estoque (Últimos 30 dias)</h2>
            <canvas id="graficoEvolucao"></canvas>
          </div>
        </div>
      </div>

      <div class="tabela">
        <h2>Últimas Movimentações</h2>
        <table>
          <thead>
            <tr>
              <th>Produto</th>
              <th>Tipo</th>
              <th>Quantidade</th>
              <th>Data/Hora</th>
              <th>Destino</th>
            </tr>
          </thead>
          <tbody id="tabelaMovimentacoes"></tbody>
        </table>
      </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/dashboard.js"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
